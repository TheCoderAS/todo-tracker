name: Deploy to Firebase Hosting
run-name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY}}
          FIREBASE_SERVICE_ACCOUNT_NEXT_GEN_TRACK: ${{secrets.FIREBASE_SERVICE_ACCOUNT_NEXT_GEN_TRACK}}
          VITE_NOTIFICATION_SERVICE_URL: ${{secrets.NEXT_PUBLIC_NOTIFICATION_SERVICE_URL}}
          VITE_NOTIFICATION_PING_INTERVAL_MINUTES: ${{secrets.NEXT_PUBLIC_NOTIFICATION_PING_INTERVAL_MINUTES}}
          VITE_NOTIFICATION_SUMMARY_INTERVAL_MINUTES: ${{secrets.NEXT_PUBLIC_NOTIFICATION_SUMMARY_INTERVAL_MINUTES}}
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEXT_GEN_TRACK }}
          channelId: live
          projectId: next-gen-track
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          VITE_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY}}
          FIREBASE_SERVICE_ACCOUNT_NEXT_GEN_TRACK: ${{secrets.FIREBASE_SERVICE_ACCOUNT_NEXT_GEN_TRACK}}
          VITE_NOTIFICATION_SERVICE_URL: ${{secrets.NEXT_PUBLIC_NOTIFICATION_SERVICE_URL}}
          VITE_NOTIFICATION_PING_INTERVAL_MINUTES: ${{secrets.NEXT_PUBLIC_NOTIFICATION_PING_INTERVAL_MINUTES}}
          VITE_NOTIFICATION_SUMMARY_INTERVAL_MINUTES: ${{secrets.NEXT_PUBLIC_NOTIFICATION_SUMMARY_INTERVAL_MINUTES}}
      # Runs after the Hosting deploy so a rules failure cannot block the app
      # release. The Hosting action only publishes the static site, so Firestore,
      # Realtime Database, and Storage rules/indexes must be deployed separately.
      # Requires the deploy service account to have the Service Usage Consumer
      # role (roles/serviceusage.serviceUsageConsumer) so the Firebase CLI can
      # run its API-enablement prechecks for Firestore and Storage.
      - name: Deploy Firestore, Realtime Database & Storage rules
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_NEXT_GEN_TRACK" > "$RUNNER_TEMP/service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/service-account.json"
          npx --yes firebase-tools deploy \
            --only firestore:rules,firestore:indexes,database,storage \
            --project next-gen-track \
            --non-interactive \
            --force
          rm -f "$RUNNER_TEMP/service-account.json"
        env:
          FIREBASE_SERVICE_ACCOUNT_NEXT_GEN_TRACK: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEXT_GEN_TRACK }}
